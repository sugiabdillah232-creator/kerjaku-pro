<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KerjaKu V7 Banking Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{background:#020617;color:white;font-family:Arial;transition:.3s;}
.glass{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);}
.gradient{background:linear-gradient(135deg,#4f46e5,#7c3aed);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:14px;background:#0f172a;}
.page{display:none;}
.active-page{display:block;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#4f46e5;padding:10px 20px;border-radius:12px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease;}

.lock-overlay{
position:fixed;inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="min-h-screen flex items-center justify-center p-5">
<div class="glass p-6 rounded-3xl w-full max-w-md">
<h1 class="text-2xl font-bold mb-4">KerjaKu V7 Banking</h1>

<input id="username" class="w-full p-3 bg-slate-900 rounded-xl mb-3" placeholder="Username">
<input id="pin" type="password" maxlength="6" class="w-full p-3 bg-slate-900 rounded-xl mb-3" placeholder="PIN">

<button onclick="login()" class="w-full gradient py-3 rounded-xl font-bold">Login</button>
<button onclick="register()" class="w-full bg-slate-700 py-3 rounded-xl mt-2">Daftar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden pb-28">

<header class="p-5 flex justify-between items-center">
<div>
<h1 class="text-xl font-bold">KerjaKu 👋</h1>
<p id="welcomeUser"></p>
</div>

<div class="flex gap-2">
<button onclick="toggleTheme()" class="glass p-3 rounded-xl">🌙</button>
<button onclick="openLogout()" class="glass p-3 rounded-xl">🔴</button>
</div>
</header>

<!-- HOME -->
<div id="homePage" class="page active-page px-5">

<div class="grid grid-cols-2 gap-4">

<div class="glass p-4 rounded-2xl">
<p>Total Upah</p>
<h2 id="totalUpah" class="text-xl font-bold">0</h2>
</div>

<div class="glass p-4 rounded-2xl">
<p>Total Jam</p>
<h2 id="totalJam" class="text-xl font-bold">0</h2>
</div>

</div>

<div class="glass p-4 rounded-2xl mt-5">
<canvas id="chartBulanan"></canvas>
</div>

<div class="glass p-4 rounded-2xl mt-5">
<h2 class="font-bold mb-3">Data Lembur</h2>
<div id="listData"></div>
</div>

</div>

<!-- TAMBAH -->
<div id="tambahPage" class="page px-5">

<div class="glass p-5 rounded-2xl">

<input id="tanggal" type="date" class="w-full p-3 bg-slate-900 rounded-xl mb-3">
<input id="gaji" type="number" class="w-full p-3 bg-slate-900 rounded-xl mb-3" placeholder="Gaji">

<select id="jenisHari" class="w-full p-3 bg-slate-900 rounded-xl mb-3">
<option value="kerja">Kerja</option>
<option value="libur">Libur</option>
</select>

<input id="jam" type="range" min="1" max="24" value="1">
<p>Jam: <span id="jamText">1</span></p>

<button onclick="simpanLembur()" class="w-full gradient py-3 rounded-xl mt-3">Simpan</button>

</div>

</div>

<!-- SETTING -->
<div id="settingPage" class="page px-5">
<div class="glass p-5 rounded-2xl space-y-3">

<button onclick="downloadPDF()" class="w-full bg-green-600 py-3 rounded-xl">PDF</button>
<button onclick="exportExcel()" class="w-full bg-blue-600 py-3 rounded-xl">Excel</button>
<button onclick="hapusSemua()" class="w-full bg-red-600 py-3 rounded-xl">Hapus Semua</button>

</div>
</div>

</div>

<!-- LOGOUT V4 -->
<div id="logoutModal" class="hidden lock-overlay">

<div class="glass p-5 rounded-2xl w-[85%] max-w-sm text-center">

<h2 class="font-bold mb-2">Security Logout</h2>
<p class="text-sm mb-3">Ketik LOGOUT</p>

<input id="logoutConfirmInput" class="w-full p-2 rounded-xl bg-black/40 text-center mb-3">

<button onclick="verifyLogout()" class="w-full bg-red-600 py-2 rounded-xl">Logout</button>

</div>

</div>

<script>
lucide.createIcons();

let idleTimer;

/* AUTO LOCK */
function resetIdle(){
clearTimeout(idleTimer);
idleTimer=setTimeout(lockApp,120000);
}
document.addEventListener("click",resetIdle);
document.addEventListener("mousemove",resetIdle);
document.addEventListener("keypress",resetIdle);

/* LOCK */
function lockApp(){
alert("Session terkunci, refresh untuk login ulang");
}

/* AUTH */
function register(){
let u=username.value,p=pin.value;
let users=JSON.parse(localStorage.getItem("users")||"[]");
users.push({username:u,pin:p});
localStorage.setItem("users",JSON.stringify(users));
alert("Daftar sukses");
}

function login(){
let u=username.value,p=pin.value;
let users=JSON.parse(localStorage.getItem("users")||"[]");
let ok=users.find(x=>x.username===u&&x.pin===p);
if(!ok)return alert("Gagal login");

localStorage.setItem("activeUser",u);
loadApp();
}

function loadApp(){
let u=localStorage.getItem("activeUser");
if(!u)return;

loginPage.classList.add("hidden");
app.classList.remove("hidden");

welcomeUser.innerText="Hi "+u;

renderData();
renderChart();
resetIdle();
}

/* DATA */
function simpanLembur(){
let t=tanggal.value;
let g=parseFloat(gaji.value);
let j=jenisHari.value;
let jam=parseInt(document.getElementById("jam").value);

let total=(g/173)*jam;

let key="lembur_"+localStorage.getItem("activeUser");
let data=JSON.parse(localStorage.getItem(key)||"[]");

data.push({tanggal:t,jam,total});
localStorage.setItem(key,JSON.stringify(data));

renderData();
renderChart();
}

function renderData(){
let key="lembur_"+localStorage.getItem("activeUser");
let data=JSON.parse(localStorage.getItem(key)||"[]");

listData.innerHTML="";

let total=0,jam=0;

data.forEach(d=>{
total+=d.total;
jam+=d.jam;
});

totalUpah.innerText=Math.floor(total).toLocaleString("id-ID");
totalJam.innerText=jam;

data.slice().reverse().forEach((d,i)=>{
listData.innerHTML+=`
<div class="bg-slate-900 p-3 rounded-xl mt-2 flex justify-between">
<div>${d.tanggal}<br>${d.jam} Jam</div>
<div>${Math.floor(d.total)}</div>
</div>`;
});
}

function renderChart(){
let key="lembur_"+localStorage.getItem("activeUser");
let data=JSON.parse(localStorage.getItem(key)||"[]");

if(window.chartInstance)window.chartInstance.destroy();

let ctx=document.getElementById("chartBulanan");

window.chartInstance=new Chart(ctx,{
type:"bar",
data:{
labels:data.map(d=>d.tanggal),
datasets:[{data:data.map(d=>d.total)}]
}
});
}

/* PAGE */
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active-page"));
document.getElementById(id).classList.add("active-page","fade-in");
}

/* LOGOUT V7 */
function openLogout(){
logoutModal.classList.remove("hidden");
}

function verifyLogout(){
if(logoutConfirmInput.value!=="LOGOUT"){
alert("Kode salah");
return;
}

localStorage.removeItem("activeUser");
location.reload();
}

/* EXPORT */
function downloadPDF(){alert("PDF ready");}
function exportExcel(){alert("Excel ready");}
function hapusSemua(){alert("hapus data");}

function toggleTheme(){
document.body.classList.toggle("light");
}
</script>

</body>
</html>
