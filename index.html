<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KerjaKu Pro V6</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{background:#020617;color:white;font-family:Arial;transition:.3s;}
.light{background:#f8fafc;color:#0f172a;}
.glass{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);}
.gradient{background:linear-gradient(135deg,#4f46e5,#7c3aed);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:14px;background:#0f172a;border-top:1px solid #1e293b;}
.page{display:none;}
.active-page{display:block;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#4f46e5;padding:12px 20px;border-radius:16px;z-index:999;}
</style>
</head>

<body>

<div id="loginPage" class="min-h-screen flex items-center justify-center p-5">
<div class="glass rounded-3xl p-8 w-full max-w-md">
<h1 class="text-3xl font-bold text-center mb-6">KerjaKu Pro V6</h1>

<input id="username" type="text" placeholder="Username" class="w-full p-4 rounded-2xl bg-slate-900 mb-4">
<input id="pin" type="password" maxlength="6" placeholder="PIN" class="w-full p-4 rounded-2xl bg-slate-900 mb-4">

<button onclick="login()" class="w-full gradient py-4 rounded-2xl font-bold">Masuk</button>
<button onclick="register()" class="w-full bg-slate-800 py-4 rounded-2xl font-bold mt-3">Daftar</button>
</div>
</div>

<div id="app" class="hidden pb-28">

<header class="p-5 flex justify-between items-center">
<div>
<h1 class="text-3xl font-bold">KerjaKu 👋</h1>
<p id="welcomeUser"></p>
</div>

<div class="flex gap-2">
<button onclick="toggleTheme()" class="glass p-3 rounded-2xl">🌙 Dark Mode</button>
<button onclick="logout()" class="glass p-3 rounded-2xl">🔴 Logout</button>
</div>
</header>

<div id="homePage" class="page active-page px-5">

<div class="grid grid-cols-2 gap-4">
<div class="glass rounded-3xl p-5">
<p>Total Upah</p>
<h2 id="totalUpah" class="text-2xl font-bold mt-2">Rp 0</h2>
</div>

<div class="glass rounded-3xl p-5">
<p>Total Jam</p>
<h2 id="totalJam" class="text-2xl font-bold mt-2">0 Jam</h2>
</div>
</div>

<div class="glass rounded-3xl p-5 mt-5">
<canvas id="chartBulanan"></canvas>
</div>

<div class="glass rounded-3xl p-5 mt-5">
<h2 class="text-xl font-bold mb-4">Rekap Data</h2>
<div id="listData"></div>
</div>
</div>

<div id="tambahPage" class="page px-5">
<div class="glass rounded-3xl p-5">
<h2 class="text-2xl font-bold mb-5">Tambah Lembur</h2>

<input id="tanggal" type="date" class="w-full p-4 rounded-2xl bg-slate-900 mb-4">
<input id="gaji" type="number" placeholder="Gaji Bulanan" class="w-full p-4 rounded-2xl bg-slate-900 mb-4">

<select id="jenisHari" class="w-full p-4 rounded-2xl bg-slate-900 mb-4">
<option value="kerja">Hari Kerja</option>
<option value="libur">Hari Libur</option>
</select>

<input type="range" id="jam" min="1" max="24" value="1" class="w-full">
<p class="mt-2">Jam: <span id="jamText">1</span></p>

<button onclick="simpanLembur()" class="w-full gradient py-4 rounded-2xl mt-5 font-bold">Simpan</button>
</div>
</div>

<div id="statistikPage" class="page px-5">
<div class="glass rounded-3xl p-5">
<h2 class="text-2xl font-bold mb-5">Statistik</h2>
<canvas id="chart2"></canvas>
</div>
</div>

<div id="settingPage" class="page px-5">
<div class="glass rounded-3xl p-5 space-y-4">
<button onclick="downloadPDF()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold">Export PDF</button>
<button onclick="exportExcel()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">Export Excel</button>
<button onclick="backupData()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold">Backup JSON</button>

<input type="file" id="restoreFile" class="w-full p-4 rounded-2xl bg-slate-900">

<button onclick="restoreData()" class="w-full bg-orange-600 py-4 rounded-2xl font-bold">Restore Data</button>
<button onclick="hapusSemua()" class="w-full bg-red-600 py-4 rounded-2xl font-bold">Hapus Semua</button>
</div>
</div>

<nav class="bottom-nav">
<button onclick="showPage('homePage')">🏠Home</button>
<button onclick="showPage('tambahPage')">➕Kalkulator</button>
<button onclick="showPage('settingPage')">⚙️Setting</button>
</nav>

</div>

<script>
lucide.createIcons();

// FIX: slider element
const slider = document.getElementById('jam');

slider.addEventListener("input", function () {
  document.getElementById("jamText").innerText = this.value;
});

function toast(msg){
const div=document.createElement('div');
div.className='toast';
div.innerText=msg;
document.body.appendChild(div);
setTimeout(()=>div.remove(),2500);
}

function rupiah(x){
return 'Rp '+Math.round(x).toLocaleString('id-ID');
}

function register(){
const username=document.getElementById('username').value;
const pin=document.getElementById('pin').value;

if(!username||pin.length!==6){
alert('Isi benar');
return;
}

let users=JSON.parse(localStorage.getItem('users'))||[];
users.push({username,pin});
localStorage.setItem('users',JSON.stringify(users));

toast('Pendaftaran berhasil');
}

function login(){
const username=document.getElementById('username').value;
const pin=document.getElementById('pin').value;

let users=JSON.parse(localStorage.getItem('users'))||[];
const user=users.find(u=>u.username===username&&u.pin===pin);

if(!user){
alert('Login gagal');
return;
}

localStorage.setItem('activeUser',username);
loadApp();
}

function logout(){
localStorage.removeItem('activeUser');
location.reload();
}

function loadApp(){
const user=localStorage.getItem('activeUser');
if(!user)return;

loginPage.classList.add('hidden');
app.classList.remove('hidden');

welcomeUser.innerText='Selamat datang '+user;

renderData();
renderChart();
}

window.onload=loadApp;

function hitungLembur(gaji,jenis,jam){
const upah=gaji/173;
let hasil=0;

if(jenis==='kerja'){
if(jam>=1)hasil+=1.5;
if(jam>1)hasil+=(jam-1)*2;
}else{
for(let i=1;i<=jam;i++){
if(i<=8)hasil+=2;
else if(i===9)hasil+=3;
else hasil+=4;
}
}

return upah*hasil;
}

function simpanLembur(){

// FIX: ambil value dengan benar
const tanggal=document.getElementById('tanggal').value;
const gaji=parseFloat(document.getElementById('gaji').value);
const jenis=document.getElementById('jenisHari').value;
const jam=parseInt(slider.value);

const total=hitungLembur(gaji,jenis,jam);

const data={tanggal,jenis,jam,total};

const key='lembur_'+localStorage.getItem('activeUser');

let arr=JSON.parse(localStorage.getItem(key))||[];
arr.push(data);

localStorage.setItem(key,JSON.stringify(arr));

renderData();
renderChart();
toast('Data disimpan');
}

function renderData(){
const key='lembur_'+localStorage.getItem('activeUser');
let data=JSON.parse(localStorage.getItem(key))||[];

listData.innerHTML='';

let total=0;
let jam=0;

[...data].reverse().forEach((item,index)=>{
total+=item.total;
jam+=item.jam;

listData.innerHTML+=`
<div class="bg-slate-900 p-4 rounded-2xl mt-3 flex justify-between">
<div>
<h3>${item.tanggal}</h3>
<p>${item.jam} Jam</p>
</div>

<div class="text-right">
<h3>${rupiah(item.total)}</h3>
<button onclick="hapusItem(${data.length-1-index})" class="text-red-400 text-sm mt-2">Hapus</button>
</div>
</div>
`;
});

totalUpah.innerText=rupiah(total);
totalJam.innerText=jam+' Jam';
}

function hapusItem(i){
const key='lembur_'+localStorage.getItem('activeUser');
let data=JSON.parse(localStorage.getItem(key))||[];

data.splice(i,1);
localStorage.setItem(key,JSON.stringify(data));

renderData();
renderChart();
}

function hapusSemua(){
const key='lembur_'+localStorage.getItem('activeUser');
localStorage.removeItem(key);
renderData();
renderChart();
}

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
document.getElementById(id).classList.add('active-page');
}

function renderChart(){
const key='lembur_'+localStorage.getItem('activeUser');
let data=JSON.parse(localStorage.getItem(key))||[];

const labels=data.map(d=>d.tanggal);
const values=data.map(d=>d.total);

const ctx=document.getElementById('chartBulanan');

if(window.chartInstance){
window.chartInstance.destroy();
}

window.chartInstance=new Chart(ctx,{
type:'bar',
data:{labels,datasets:[{label:'Upah Lembur',data:values}]}
});
}

async function downloadPDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();

const key='lembur_'+localStorage.getItem('activeUser');
let data=JSON.parse(localStorage.getItem(key))||[];

let body=[];
let grand=0;

data.forEach((d,i)=>{
grand+=d.total;
body.push([i+1,d.tanggal,d.jam+' Jam',rupiah(d.total)]);
});

doc.text('Laporan Lembur',14,15);

doc.autoTable({
head:[['No','Tanggal','Jam','Upah']],
body:body,
startY:25
});

doc.text('Grand Total : '+rupiah(grand),14,doc.lastAutoTable.finalY+10);

doc.save('KerjaKu.pdf');
}

function exportExcel(){
const key='lembur_'+localStorage.getItem('activeUser');
let data=JSON.parse(localStorage.getItem(key))||[];

const wb=XLSX.utils.book_new();
const ws=XLSX.utils.json_to_sheet(data);

XLSX.utils.book_append_sheet(wb,ws,'Lembur');
XLSX.writeFile(wb,'KerjaKu.xlsx');
}

function backupData(){
const key='lembur_'+localStorage.getItem('activeUser');
const data=localStorage.getItem(key);

const blob=new Blob([data],{type:'application/json'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='backup.json';
a.click();
}

function restoreData(){
const file=document.getElementById('restoreFile').files[0];
if(!file)return;

const reader=new FileReader();

reader.onload=function(e){
const key='lembur_'+localStorage.getItem('activeUser');
localStorage.setItem(key,e.target.result);
renderData();
renderChart();
};

reader.readAsText(file);
}

function toggleTheme(){
document.body.classList.toggle('light');
}

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
