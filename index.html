<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KerjaKu Pro V5</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#020617;
      color:white;
    }

    .glass{
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .gradient{
      background:linear-gradient(135deg, #4f46e5, #7c3aed);
    }

    .glow{
      box-shadow: 0 0 25px rgba(99,102,241,.25);
    }
  </style>
</head>

<body>

<div id="loginPage" class="min-h-screen flex items-center justify-center p-5">
  <div class="glass rounded-3xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-20 h-20 rounded-3xl gradient glow mx-auto flex items-center justify-center mb-5">
        <i data-lucide="briefcase-business"></i>
      </div>
      <h1 class="text-3xl font-bold">KerjaKu Pro</h1>
      <p class="text-slate-400 mt-2">Teman pekerja Indonesia</p>
    </div>

    <div class="space-y-4">
      <input type="text" id="username" placeholder="Username" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-white">
      <input type="password" id="pin" maxlength="6" placeholder="PIN 6 Digit" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-white">
      <button onclick="login()" class="w-full gradient py-4 rounded-2xl font-bold text-white">Masuk Aplikasi</button>
      <button onclick="register()" class="w-full bg-slate-800 py-4 rounded-2xl font-bold text-white">Daftar Akun Baru</button>
    </div>
  </div>
</div>

<div id="dashboardPage" class="hidden pb-32">
  <header class="p-5 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-bold">KerjaKu 👋</h1>
      <p id="welcomeUser" class="text-slate-400 mt-1"></p>
    </div>
    <button onclick="logout()" class="glass p-3 rounded-2xl">
      <i data-lucide="log-out"></i>
    </button>
  </header>

  <section class="px-5">
    <div class="glass rounded-3xl p-6 glow">
      <p class="text-slate-400">Total Upah Lembur</p>
      <h2 id="totalUpah" class="text-4xl font-bold mt-3">Rp 0</h2>
      <div class="grid grid-cols-2 gap-4 mt-6">
        <div class="bg-slate-900 rounded-2xl p-4">
          <p class="text-slate-400 text-sm">Total Jam Lembur</p>
          <h3 id="totalJam" class="text-2xl font-bold mt-2">0 Jam</h3>
        </div>
        <div class="bg-slate-900 rounded-2xl p-4">
          <p class="text-slate-400 text-sm">Data Tersimpan</p>
          <h3 id="jumlahData" class="text-2xl font-bold mt-2">0</h3>
        </div>
      </div>
    </div>
  </section>

  <section class="px-5 mt-6">
    <div class="glass rounded-3xl p-5">
      <div class="flex justify-between items-center mb-4">
        <h2 id="formTitle" class="text-2xl font-bold">Kalkulator Lembur</h2>
        <button id="btnToggleMode" onclick="toggleModeLupaAbsen()" class="text-xs font-bold px-3 py-1.5 rounded-xl bg-amber-500/10 text-amber-400 border border-amber-500/20 hover:bg-amber-500/20 transition">
          Lupa Absen?
        </button>
      </div>
      
      <div class="space-y-4">
        <div>
          <label class="text-xs text-slate-400 block mb-1">Tanggal Kerja</label>
          <input type="date" id="tanggal" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 text-white outline-none">
        </div>

        <div>
          <label class="text-xs text-slate-400 block mb-1">Gaji Pokok Bulanan</label>
          <input type="number" id="gaji" placeholder="Gaji Bulanan" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 text-white outline-none">
        </div>

        <div>
          <label class="text-xs text-slate-400 block mb-1">Kategori Hari</label>
          <select id="jenisHari" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 text-white outline-none">
            <option value="kerja">Hari Kerja</option>
            <option value="libur">Hari Libur / Tanggal Merah</option>
          </select>
        </div>

        <div id="wrapperModeNormal">
          <div class="flex justify-between mb-2">
            <span class="text-sm text-slate-300">Durasi Jam Lembur</span>
            <span id="jamText" class="font-bold text-indigo-400">1</span>
          </div>
          <input type="range" id="jam" min="1" max="24" value="1" class="w-full accent-indigo-500">
        </div>

        <div id="wrapperModeLupa" class="hidden grid grid-cols-2 gap-4 bg-slate-950/40 p-4 rounded-2xl border border-slate-800">
          <div class="col-span-2 text-xs text-amber-400 font-medium mb-1">
            *Aturan Batasan: Maksimal 3 hari ke belakang & hanya bisa input 1 kali per tanggal.
          </div>
          <div>
            <label class="text-xs text-slate-400 block mb-1">Jam Masuk Kerja</label>
            <input type="time" id="jamMasukManual" value="08:00" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-white text-sm outline-none">
          </div>
          <div>
            <label class="text-xs text-slate-400 block mb-1">Jam Pulang Kerja</label>
            <input type="time" id="jamPulangManual" value="17:00" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-white text-sm outline-none">
          </div>
        </div>

        <button onclick="simpanLembur()" class="w-full gradient py-4 rounded-2xl font-bold text-white transition active:scale-95">Simpan Data</button>
        <button onclick="downloadPDF()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold text-white transition active:scale-95">Download PDF Laporan</button>
      </div>
    </div>
  </section>

  <section class="px-5 mt-6">
    <div class="glass rounded-3xl p-5">
      <div class="flex justify-between items-center mb-5">
        <h2 class="text-2xl font-bold">Rekap Data</h2>
        <button onclick="hapusData()" class="bg-red-600 px-4 py-2 rounded-xl text-sm font-bold text-white transition active:scale-95">Hapus Semua</button>
      </div>
      <div id="listData" class="space-y-4"></div>
    </div>
  </section>
</div>

<script>
let isModeLupaAbsen = false;
lucide.createIcons();

const slider = document.getElementById("jam");
const jamText = document.getElementById("jamText");

slider.addEventListener("input", () => {
  jamText.innerText = slider.value;
});

function toggleModeLupaAbsen() {
  isModeLupaAbsen = !isModeLupaAbsen;
  const formTitle = document.getElementById("formTitle");
  const btnToggle = document.getElementById("btnToggleMode");
  const wrapperNormal = document.getElementById("wrapperModeNormal");
  const wrapperLupa = document.getElementById("wrapperModeLupa");

  if(isModeLupaAbsen) {
    formTitle.innerText = "Form Lupa Absen";
    btnToggle.innerText = "Kembali";
    btnToggle.className = "text-xs font-bold px-3 py-1.5 rounded-xl bg-slate-700 text-slate-300 border border-slate-600 hover:bg-slate-600 transition";
    wrapperNormal.classList.add("hidden");
    wrapperLupa.classList.remove("hidden");
  } else {
    formTitle.innerText = "Kalkulator Lembur";
    btnToggle.innerText = "Lupa Absen?";
    btnToggle.className = "text-xs font-bold px-3 py-1.5 rounded-xl bg-amber-500/10 text-amber-400 border border-amber-500/20 hover:bg-amber-500/20 transition";
    wrapperNormal.classList.remove("hidden");
    wrapperLupa.classList.add("hidden");
  }
}

function rupiah(angka){
  return "Rp " + Math.round(angka).toLocaleString("id-ID");
}

function register(){
  const username = document.getElementById("username").value.trim();
  const pin = document.getElementById("pin").value;

  if(!username || pin.length !== 6){
    alert("Isi username dan PIN 6 digit");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];
  const cek = users.find(u => u.username.toLowerCase() === username.toLowerCase());

  if(cek){
    alert("Username sudah ada");
    return;
  }

  users.push({ username, pin });
  localStorage.setItem("users", JSON.stringify(users));
  alert("Pendaftaran berhasil");
}

function login(){
  const username = document.getElementById("username").value.trim();
  const pin = document.getElementById("pin").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];
  const user = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.pin === pin);

  if(!user){
    alert("Username atau PIN salah");
    return;
  }

  localStorage.setItem("activeUser", user.username);
  tampilDashboard();
}

function tampilDashboard(){
  const user = localStorage.getItem("activeUser");
  if(!user) return;

  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("dashboardPage").classList.remove("hidden");
  document.getElementById("welcomeUser").innerText = "Selamat datang, " + user;

  tampilkanData();
}

window.onload = tampilDashboard;

function logout(){
  localStorage.removeItem("activeUser");
  location.reload();
}

function hitungLembur(gaji, jenisHari, jam){
  const upahPerJam = gaji / 173;
  let konversions = 0;

  if(jenisHari === "kerja"){
    if(jam >= 1) konversions += 1.5;
    if(jam > 1)  konversions += (jam - 1) * 2;
  } else {
    for(let i = 1; i <= jam; i++){
      if(i <= 8)       konversions += 2;
      else if(i === 9) konversions += 3;
      else             konversions += 4;
    }
  }
  return upahPerJam * konversions;
}

// PERBAIKAN LOGIKA: VALIDASI BATASAN 3 HARI & 1 KALI INPUT PER TANGGAL
function simpanLembur(){
  const tanggalInput = document.getElementById("tanggal").value;
  const gajiInput = document.getElementById("gaji").value;
  const gaji = parseFloat(gajiInput);
  const jenisHari = document.getElementById("jenisHari").value;

  if(!tanggalInput || !gajiInput || isNaN(gaji) || gaji <= 0){
    alert("Lengkapi data dengan benar (Gaji harus berupa angka positif)");
    return;
  }

  const user = localStorage.getItem("activeUser");
  const key = "lembur_" + user;
  let daftar = JSON.parse(localStorage.getItem(key)) || [];

  if (isModeLupaAbsen) {
    // 1. VALIDASI BATASAN WAKTU: Maksimal 3 Hari Ke Belakang
    const tanggalDipilih = new Date(tanggalInput);
    tanggalDipilih.setHours(0,0,0,0);
    
    const hariIni = new Date();
    hariIni.setHours(0,0,0,0);

    const selisihWaktu = hariIni.getTime() - tanggalDipilih.getTime();
    const selisihHari = Math.floor(selisihWaktu / (1000 * 60 * 60 * 24));

    if (selisihHari > 3) {
      alert("⚠️ Pengajuan Gagal: Anda hanya diperbolehkan mencatat absen maksimal 3 hari ke belakang.");
      return;
    }
    if (selisihHari < 0) {
      alert("⚠️ Pengajuan Gagal: Tidak bisa mengajukan absen manual untuk tanggal masa depan.");
      return;
    }

    // 2. VALIDASI JUMLAH REVISI: Hanya boleh 1 kali input data per tanggal
    const sudahAdaData = daftar.find(item => item.tanggal === tanggalInput);
    if (sudahAdaData) {
      alert(`⚠️ Pengajuan Gagal: Tanggal ${tanggalInput} sudah memiliki catatan absen. Batas maksimal revisi manual hanya 1 kali.`);
      return;
    }

    // Mulai eksekusi kalkulasi jam kerja manual jika lolos validasi
    const masukVal = document.getElementById("jamMasukManual").value;
    const pulangVal = document.getElementById("jamPulangManual").value;

    if(!masukVal || !pulangVal) {
      alert("Silakan isi jam masuk dan jam pulang manual.");
      return;
    }

    const [hMasuk, mMasuk] = masukVal.split(':').map(Number);
    const [hPulang, mPulang] = pulangVal.split(':').map(Number);

    let totalMenit = (hPulang * 60 + mPulang) - (hMasuk * 60 + mMasuk);
    if (totalMenit < 0) totalMenit += 24 * 60; 

    let totalJamKerja = totalMenit / 60;
    
    if(totalJamKerja > 5) {
      totalJamKerja -= 1; // Potong istirahat otomatis 1 jam
    }

    let jamLemburFinal = 0;
    if (jenisHari === "kerja") {
      if (totalJamKerja > 8) {
        jamLemburFinal = Math.round((totalJamKerja - 8) * 100) / 100;
      }
    } else {
      jamLemburFinal = Math.round(totalJamKerja * 100) / 100;
    }

    const total = hitungLembur(gaji, jenisHari, jamLemburFinal);
    daftar.push({ 
      tanggal: tanggalInput, 
      jam: jamLemburFinal, 
      jenisHari, 
      total,
      isManual: true,
      logWaktu: ` (${masukVal} - ${pulangVal})`
    });

    toggleModeLupaAbsen(); // Kembalikan ke mode normal setelah sukses
  } else {
    // Jalankan penyimpanan kalkulator geser normal
    const jamLemburFinal = parseInt(slider.value);
    const total = hitungLembur(gaji, jenisHari, jamLemburFinal);
    daftar.push({ 
      tanggal: tanggalInput, 
      jam: jamLemburFinal, 
      jenisHari, 
      total,
      isManual: false,
      logWaktu: ""
    });
  }

  localStorage.setItem(key, JSON.stringify(daftar));
  tampilkanData();
  alert("Data kehadiran berhasil disimpan!");
}

function tampilkanData(){
  const user = localStorage.getItem("activeUser");
  const key = "lembur_" + user;
  let daftar = JSON.parse(localStorage.getItem(key)) || [];

  const list = document.getElementById("listData");
  list.innerHTML = "";

  let grandTotal = 0;
  let totalJam = 0;

  daftar.forEach(item => {
    grandTotal += item.total;
    totalJam += item.jam;
  });

  const dataTampil = [...daftar].reverse();

  dataTampil.forEach(item => {
    const labelHari = item.jenisHari === 'kerja' ? 'Hari Kerja' : 'Hari Libur';
    const tagManual = item.isManual ? `<span class="text-[10px] bg-amber-500/20 text-amber-400 border border-amber-500/30 px-2 py-0.5 rounded-md font-medium ml-2">Retroaktif (Locked)</span>` : '';
    const infoWaktu = item.logWaktu ? item.logWaktu : '';

    list.innerHTML += `
    <div class="bg-slate-900 rounded-2xl p-4 flex justify-between items-center border border-slate-800/60">
      <div>
        <h3 class="font-bold flex items-center">${item.tanggal}${infoWaktu} ${tagManual}</h3>
        <p class="text-slate-400 text-sm mt-1">
          Lembur: ${item.jam} Jam • ${labelHari}
        </p>
      </div>
      <div class="text-right">
        <h3 class="font-bold text-xl text-indigo-400">${rupiah(item.total)}</h3>
      </div>
    </div>
    `;
  });

  document.getElementById("totalUpah").innerText = rupiah(grandTotal);
  document.getElementById("totalJam").innerText = totalJam.toFixed(1) + " Jam";
  document.getElementById("jumlahData").innerText = daftar.length;
}

function hapusData(){
  const user = localStorage.getItem("activeUser");
  const key = "lembur_" + user;
  let daftar = JSON.parse(localStorage.getItem(key)) || [];

  if(daftar.length === 0){
    alert("Belum ada data untuk dihapus");
    return;
  }

  if(confirm("Hapus semua data?")){
    localStorage.removeItem(key);
    tampilkanData();
  }
}

async function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  
  const user = localStorage.getItem("activeUser");
  const key = "lembur_" + user;
  let daftar = JSON.parse(localStorage.getItem(key)) || [];

  if(daftar.length === 0){
    alert("Belum ada data");
    return;
  }

  doc.setFillColor(79, 70, 229);
  doc.rect(0, 0, 210, 40, 'F');

  doc.setFont("helvetica", "bold");
  doc.setFontSize(22);
  doc.setTextColor(255, 255, 255);
  doc.text("KERJAKU PRO", 15, 20);

  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.setTextColor(218, 211, 249);
  doc.text("Laporan Rekapitulasi Upah Lembur Karyawan", 15, 28);

  let y = 55;
  doc.setFont("helvetica", "bold");
  doc.setFontSize(11);
  doc.setTextColor(51, 65, 85);
  doc.text("NAMA KARYAWAN :", 15, y);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(15, 23, 42); 
  doc.text(user.toUpperCase(), 58, y);

  doc.setFont("helvetica", "bold");
  doc.setTextColor(51, 65, 85);
  doc.text("TANGGAL CETAK  :", 15, y + 6);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(15, 23, 42);
  const tglSekarang = new Date().toLocaleDateString("id-ID", { year: 'numeric', month: 'long', day: 'numeric' });
  doc.text(tglSekarang, 58, y + 6);

  let grandTotal = 0;
  let totalJamLembur = 0;
  const barisTabel = [];

  daftar.forEach((item, index) => {
    grandTotal += item.total;
    totalJamLembur += item.jam;
    let infoHari = item.jenisHari === 'kerja' ? 'Hari Kerja' : 'Hari Libur';
    if(item.isManual) infoHari += " (Manual)";
    
    barisTabel.push([
      index + 1,
      item.tanggal + (item.logWaktu ? item.logWaktu : ''),
      `${item.jam} Jam`,
      infoHari,
      rupiah(item.total)
    ]);
  });

  doc.autoTable({
    startY: y + 16,
    head: [['No', 'Tanggal', 'Durasi Lembur', 'Jenis Hari', 'Jumlah Upah']],
    body: barisTabel,
    theme: 'striped',
    headStyles: { fillColor: [15, 23, 42], textColor: [255, 255, 255], fontStyle: 'bold', halign: 'center' },
    columnStyles: {
      0: { halign: 'center', width: 15 },
      1: { halign: 'center' },
      2: { halign: 'center' },
      4: { halign: 'right', fontStyle: 'bold' }
    },
    styles: { font: 'helvetica', fontSize: 10, cellPadding: 4 }
  });

  let finalY = doc.lastAutoTable.finalY + 10;
  if (finalY > 240) { doc.addPage(); finalY = 20; }

  doc.setFillColor(241, 245, 249);
  doc.setDrawColor(226, 232, 240);
  doc.roundedRect(110, finalY, 85, 30, 4, 4, 'FD');

  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.setTextColor(100, 116, 139);
  doc.text(`Total Akumulasi Jam: ${totalJamLembur.toFixed(1)} Jam`, 115, finalY + 10);

  doc.setFont("helvetica", "bold");
  doc.setFontSize(11);
  doc.setTextColor(15, 23, 42);
  doc.text("GRAND TOTAL UPAH:", 115, finalY + 18);
  doc.setFontSize(14);
  doc.setTextColor(79, 70, 229); 
  doc.text(rupiah(grandTotal), 115, finalY + 25);

  doc.save(`Laporan_Lembur_${user}.pdf`);
}
</script>

</body>
</html>
