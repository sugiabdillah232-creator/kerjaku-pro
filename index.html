<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>KerjaKu Pro V6</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#020617;
      color:white;
    }

    .glass{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .gradient{
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
    }

    .glow{
      box-shadow:0 0 25px rgba(99,102,241,.25);
    }

    input[type="range"]{
      accent-color:#4f46e5;
    }

    ::-webkit-scrollbar{
      width:6px;
    }

    ::-webkit-scrollbar-thumb{
      background:#4f46e5;
      border-radius:20px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="min-h-screen flex items-center justify-center p-5">

  <div class="glass rounded-3xl p-8 w-full max-w-md">

    <div class="text-center mb-8">

      <div class="w-20 h-20 rounded-3xl gradient glow mx-auto flex items-center justify-center mb-5">
        <i data-lucide="briefcase-business"></i>
      </div>

      <h1 class="text-3xl font-bold">KerjaKu Pro</h1>

      <p class="text-slate-400 mt-2">
        Professional Edition V6
      </p>

    </div>

    <div class="space-y-4">

      <input
        type="text"
        id="username"
        placeholder="Username"
        class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
      >

      <input
        type="password"
        id="pin"
        maxlength="6"
        placeholder="PIN 6 Digit"
        class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
      >

      <button
        onclick="login()"
        class="w-full gradient py-4 rounded-2xl font-bold"
      >
        Masuk Aplikasi
      </button>

      <button
        onclick="register()"
        class="w-full bg-slate-800 py-4 rounded-2xl font-bold"
      >
        Daftar Akun Baru
      </button>

    </div>

  </div>

</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden pb-32">

  <header class="p-5 flex justify-between items-center max-w-6xl mx-auto">

    <div>
      <h1 class="text-3xl font-bold">KerjaKu 👋</h1>
      <p id="welcomeUser" class="text-slate-400 mt-1"></p>
    </div>

    <button
      onclick="logout()"
      class="glass p-3 rounded-2xl text-red-400"
    >
      <i data-lucide="log-out"></i>
    </button>

  </header>

  <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 px-5">

    <!-- LEFT -->
    <div class="lg:col-span-2 space-y-6">

      <!-- SUMMARY -->
      <section class="glass rounded-3xl p-6 glow">

        <p class="text-slate-400 font-medium">
          Estimasi Take Home Pay Lembur (Netto)
        </p>

        <h2 id="totalUpah" class="text-4xl font-bold mt-2 text-indigo-400">
          Rp 0
        </h2>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mt-6 border-t border-slate-800 pt-4">

          <div>
            <p class="text-slate-400 text-xs">Total Jam</p>
            <h3 id="totalJam" class="text-xl font-bold mt-1">0 Jam</h3>
          </div>

          <div>
            <p class="text-slate-400 text-xs">Bruto</p>
            <h3 id="totalBruto" class="text-xl font-bold mt-1 text-emerald-400">
              Rp 0
            </h3>
          </div>

          <div>
            <p class="text-slate-400 text-xs">BPJS</p>
            <h3 id="totalBpjs" class="text-xl font-bold mt-1 text-amber-400">
              Rp 0
            </h3>
          </div>

          <div>
            <p class="text-slate-400 text-xs">PPh 21</p>
            <h3 id="totalPph" class="text-xl font-bold mt-1 text-red-400">
              Rp 0
            </h3>
          </div>

          <div>
            <p class="text-slate-400 text-xs">Jumlah Data</p>
            <h3 id="jumlahData" class="text-xl font-bold mt-1 text-cyan-400">
              0
            </h3>
          </div>

        </div>

      </section>

      <!-- CHART -->
      <section class="glass rounded-3xl p-6">

        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
          <i data-lucide="bar-chart-3" class="text-indigo-400"></i>
          Grafik Pendapatan
        </h2>

        <div class="h-64">
          <canvas id="trenChart"></canvas>
        </div>

      </section>

      <!-- FORM -->
      <section class="glass rounded-3xl p-6">

        <h2 class="text-xl font-bold mb-5 flex items-center gap-2">
          <i data-lucide="calculator" class="text-indigo-400"></i>
          Kalkulator Lembur
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div>
            <label class="block text-sm text-slate-400 mb-2">
              Tanggal
            </label>

            <input
              type="date"
              id="tanggal"
              class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
            >
          </div>

          <div>
            <label class="block text-sm text-slate-400 mb-2">
              Jenis Hari
            </label>

            <select
              id="jenisHari"
              class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
            >
              <option value="kerja">Hari Kerja</option>
              <option value="libur_istirahat">Hari Libur Mingguan</option>
              <option value="libur_nasional">Hari Libur Nasional</option>
            </select>
          </div>

        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">

          <div>
            <label class="block text-sm text-slate-400 mb-2">
              Gaji Pokok
            </label>

            <input
              type="number"
              id="gajiPokok"
              value="5000000"
              class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
            >
          </div>

          <div>
            <label class="block text-sm text-slate-400 mb-2">
              Tunjangan Tetap
            </label>

            <input
              type="number"
              id="tunjanganTetap"
              value="0"
              class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
            >
          </div>

        </div>

        <!-- SLIDER -->
        <div class="mt-5 bg-slate-900/60 p-4 rounded-2xl border border-slate-800">

          <div class="flex justify-between mb-2">
            <span>Durasi Lembur</span>
            <span id="jamText" class="font-bold text-indigo-400">
              1 Jam
            </span>
          </div>

          <input
            type="range"
            id="jam"
            min="1"
            max="24"
            value="1"
            class="w-full"
          >

        </div>

        <!-- BUTTON -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-6">

          <button
            onclick="simpanLembur()"
            class="gradient py-4 rounded-2xl font-bold"
          >
            Simpan Data
          </button>

          <button
            onclick="hapusData()"
            class="bg-red-600 py-4 rounded-2xl font-bold"
          >
            Hapus Semua
          </button>

        </div>

      </section>

    </div>

    <!-- RIGHT -->
    <div>

      <section class="glass rounded-3xl p-5">

        <h2 class="text-xl font-bold mb-5 flex items-center gap-2">
          <i data-lucide="history" class="text-indigo-400"></i>
          Riwayat Lembur
        </h2>

        <div id="listData" class="space-y-3 max-h-[700px] overflow-y-auto"></div>

      </section>

    </div>

  </main>

</div>

<script>

lucide.createIcons();

const slider = document.getElementById("jam");
const jamText = document.getElementById("jamText");

slider.addEventListener("input", () => {
  jamText.innerText = slider.value + " Jam";
});

let trenChartInstance = null;

function rupiah(angka){
  return "Rp " + Math.round(angka).toLocaleString("id-ID");
}

function register(){

  const username =
    document.getElementById("username").value.trim();

  const pin =
    document.getElementById("pin").value;

  if(!username || pin.length !== 6){
    alert("Isi username dan PIN 6 digit");
    return;
  }

  let users =
    JSON.parse(localStorage.getItem("users")) || [];

  const cek =
    users.find(
      u => u.username.toLowerCase() === username.toLowerCase()
    );

  if(cek){
    alert("Username sudah digunakan");
    return;
  }

  users.push({
    username,
    pin
  });

  localStorage.setItem(
    "users",
    JSON.stringify(users)
  );

  alert("Pendaftaran berhasil");
}

function login(){

  const username =
    document.getElementById("username").value.trim();

  const pin =
    document.getElementById("pin").value;

  let users =
    JSON.parse(localStorage.getItem("users")) || [];

  const user =
    users.find(
      u =>
      u.username.toLowerCase() === username.toLowerCase()
      &&
      u.pin === pin
    );

  if(!user){
    alert("Username atau PIN salah");
    return;
  }

  localStorage.setItem(
    "activeUser",
    user.username
  );

  tampilDashboard();
}

function logout(){

  localStorage.removeItem("activeUser");

  location.reload();
}

function tampilDashboard(){

  const user =
    localStorage.getItem("activeUser");

  if(!user) return;

  document
    .getElementById("loginPage")
    .classList.add("hidden");

  document
    .getElementById("dashboardPage")
    .classList.remove("hidden");

  document
    .getElementById("welcomeUser")
    .innerText =
    "Selamat datang, " + user;

  tampilkanData();
}

window.onload = () => {

  tampilDashboard();

  const tanggal =
    document.getElementById("tanggal");

  if(tanggal){
    tanggal.valueAsDate = new Date();
  }
};

function kalkulasiLembur(gapok, tunjangan, jenisHari, jam){

  const upahSebulan =
    gapok + tunjangan;

  const upahPerJam =
    upahSebulan / 173;

  let konversi = 0;

  if(jenisHari === "kerja"){

    konversi += 1.5;

    if(jam > 1){
      konversi += (jam - 1) * 2;
    }

  }else{

    for(let i=1;i<=jam;i++){

      if(i <= 7){
        konversi += 2;
      }
      else if(i === 8){
        konversi += 3;
      }
      else{
        konversi += 4;
      }
    }
  }

  const bruto =
    upahPerJam * konversi;

  const bpjs =
    bruto * 0.01;

  const pph =
    bruto * 0.05;

  const netto =
    bruto - bpjs - pph;

  return {
    bruto,
    bpjs,
    pph,
    netto
  };
}

function simpanLembur(){

  const tanggal =
    document.getElementById("tanggal").value;

  const gapok =
    parseFloat(document.getElementById("gajiPokok").value) || 0;

  const tunjangan =
    parseFloat(document.getElementById("tunjanganTetap").value) || 0;

  const jenisHari =
    document.getElementById("jenisHari").value;

  const jam =
    parseInt(slider.value);

  if(!tanggal || gapok <= 0){
    alert("Lengkapi data");
    return;
  }

  const hasil =
    kalkulasiLembur(
      gapok,
      tunjangan,
      jenisHari,
      jam
    );

  const user =
    localStorage.getItem("activeUser");

  const key =
    "lembur_" + user;

  let data =
    JSON.parse(localStorage.getItem(key)) || [];

  data.push({
    tanggal,
    gapok,
    tunjangan,
    jenisHari,
    jam,
    bruto:hasil.bruto,
    bpjs:hasil.bpjs,
    pph:hasil.pph,
    netto:hasil.netto
  });

  localStorage.setItem(
    key,
    JSON.stringify(data)
  );

  tampilkanData();

  alert("Data berhasil disimpan");
}

function tampilkanData(){

  const user =
    localStorage.getItem("activeUser");

  const key =
    "lembur_" + user;

  let data =
    JSON.parse(localStorage.getItem(key)) || [];

  const list =
    document.getElementById("listData");

  list.innerHTML = "";

  let totalNetto = 0;
  let totalBruto = 0;
  let totalBpjs = 0;
  let totalPph = 0;
  let totalJam = 0;

  let grafik = {};

  data.forEach(item => {

    totalNetto += item.netto;
    totalBruto += item.bruto;
    totalBpjs += item.bpjs;
    totalPph += item.pph;
    totalJam += item.jam;

    const bulan =
      item.tanggal.substring(0,7);

    grafik[bulan] =
      (grafik[bulan] || 0) + item.netto;
  });

  [...data].reverse().forEach(item => {

    list.innerHTML += `
      <div class="bg-slate-900 rounded-2xl p-4 border border-slate-800">

        <div class="flex justify-between items-center">

          <div>
            <h3 class="font-bold text-sm">
              ${item.tanggal}
            </h3>

            <p class="text-slate-400 text-xs mt-1">
              ${item.jam} Jam
            </p>
          </div>

          <div class="text-right">
            <h3 class="font-bold text-indigo-400">
              ${rupiah(item.netto)}
            </h3>
          </div>

        </div>

      </div>
    `;
  });

  document.getElementById("totalUpah").innerText =
    rupiah(totalNetto);

  document.getElementById("totalJam").innerText =
    totalJam + " Jam";

  document.getElementById("totalBruto").innerText =
    rupiah(totalBruto);

  document.getElementById("totalBpjs").innerText =
    rupiah(totalBpjs);

  document.getElementById("totalPph").innerText =
    rupiah(totalPph);

  document.getElementById("jumlahData").innerText =
    data.length;

  updateGrafik(grafik);

  lucide.createIcons();
}

function updateGrafik(dataMap){

  const ctx =
    document
    .getElementById("trenChart")
    .getContext("2d");

  const labels =
    Object.keys(dataMap).sort();

  const values =
    labels.map(label => dataMap[label]);

  if(trenChartInstance){
    trenChartInstance.destroy();
  }

  trenChartInstance = new Chart(ctx, {

    type:"bar",

    data:{
      labels:labels,

      datasets:[{
        label:"Netto",
        data:values,
        backgroundColor:"rgba(79,70,229,0.6)",
        borderColor:"#4f46e5",
        borderWidth:2,
        borderRadius:8
      }]
    },

    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{
          display:false
        }
      }
    }

  });
}

function hapusData(){

  const user =
    localStorage.getItem("activeUser");

  if(confirm("Hapus semua data?")){

    localStorage.removeItem(
      "lembur_" + user
    );

    tampilkanData();
  }
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
