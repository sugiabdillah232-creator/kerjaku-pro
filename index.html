<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KerjaKu Pro V6</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#020617;
  color:white;
}
.screen{display:none}
.screen.active{display:block}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <input id="username" placeholder="username">
  <input id="pin" placeholder="pin">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden">

<header>
  <h1>KerjaKu Pro</h1>
  <div id="headerTitle">Beranda</div>
</header>

<main id="screenBeranda" class="screen active">
  <h2>Dashboard</h2>
</main>

<main id="screenAbsen" class="screen">
  <button id="btnMasuk" onclick="absenMasuk()">Masuk</button>
  <button id="btnPulang" onclick="absenPulang()">Pulang</button>
</main>

<main id="screenRiwayat" class="screen"></main>
<main id="screenPengaturan" class="screen"></main>

<nav>
<button id="nav-beranda" onclick="switchScreen('beranda',this.id)">Beranda</button>
<button id="nav-absen" onclick="switchScreen('absen',this.id)">Absensi</button>
<button id="nav-riwayat" onclick="switchScreen('riwayat',this.id)">Riwayat</button>
<button id="nav-pengaturan" onclick="switchScreen('pengaturan',this.id)">Setting</button>
</nav>

</div>

<script>
lucide.createIcons();

/* =========================
SCREEN CONTROLLER (FIXED)
========================= */
function switchScreen(screenName, navId){

document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

const target=document.getElementById('screen'+screenName.charAt(0).toUpperCase()+screenName.slice(1));
if(target) target.classList.add('active');

const label={
beranda:"Beranda",
absen:"Absensi",
riwayat:"Riwayat",
pengaturan:"Pengaturan"
};

document.getElementById("headerTitle").innerText=label[screenName]||screenName;

document.querySelectorAll("nav button").forEach(b=>{
b.style.color="#94a3b8";
});

document.getElementById(navId).style.color="#6366f1";
}

/* =========================
LOGIN
========================= */
function login(){
const u=document.getElementById("username").value;
const p=document.getElementById("pin").value;

let users=JSON.parse(localStorage.getItem("users")||"[]");
const found=users.find(x=>x.username===u&&x.pin===p);

if(!found)return alert("Login gagal");

localStorage.setItem("activeUser",u);

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboardPage").classList.remove("hidden");

switchScreen("beranda","nav-beranda");
}

/* =========================
ABSEN MASUK
========================= */
function absenMasuk(){
const user=localStorage.getItem("activeUser");
const now=new Date();

const key=`status_${user}_${now.toISOString().split('T')[0]}`;

localStorage.setItem(key,JSON.stringify({
step:"masuk",
waktuMasukRaw:now.getTime(),
jamMasuk:now.toLocaleTimeString()
}));

alert("Absen masuk berhasil");
}

/* =========================
ABSEN PULANG (FIX GRANDMA BUG)
========================= */
function absenPulang(){

const user=localStorage.getItem("activeUser");
const now=new Date();

const key=`status_${user}_${now.toISOString().split('T')[0]}`;

let data=JSON.parse(localStorage.getItem(key)||"null");
if(!data)return alert("Belum absen masuk");

/* ❗ FIX BUG UTAMA */
data.step="selesai";
data.waktuPulangRaw=now.getTime(); // FIXED
data.jamPulang=now.toLocaleTimeString();

localStorage.setItem(key,JSON.stringify(data));

alert("Absen pulang berhasil");
}

/* =========================
REGISTER
========================= */
function register(){
const u=document.getElementById("username").value;
const p=document.getElementById("pin").value;

let users=JSON.parse(localStorage.getItem("users")||"[]");

users.push({username:u,pin:p});

localStorage.setItem("users",JSON.stringify(users));

alert("User dibuat");
}
</script>

</body>
</html>
